name: Deploy Carrinho

on:
  push:
    branches: [main]
    paths:
      - 'carrinho/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push imagem
        uses: docker/build-push-action@v5
        with:
          context: ./carrinho
          push: true
          tags: |
            edialgon/ecomerce-carrinho:latest
            edialgon/ecomerce-carrinho:${{ github.sha }}
          platforms: linux/arm64

      - name: Deploy na OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/ubuntu/MicroService-Ecommerce
            git pull origin main
            docker compose pull ecomerce-carrinho
            docker compose up -d ecomerce-carrinho