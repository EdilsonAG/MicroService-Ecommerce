version: "3.9"

networks:
  ecomerce-network:
    driver: bridge

services:

  ecomerce-redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - ecomerce-network

 

  ecomerce-mysql-produto:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Ed.183729"
    ports:
      - "3308:3306"
    networks:
      - ecomerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pEd.183729"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  ecomerce-mysql-auth:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Ed.183729"
    ports:
      - "3307:3306"
    networks:
      - ecomerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pEd.183729"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ecomerce-auth:
    build: ./auth/demo/demo
    image: ecomerce-auth
    environment:
      DB_HOST: ecomerce-mysql-auth
      PROFILE: docker
      REDIS_HOST: ecomerce-redis
    ports:
      - "8080:8080"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-mysql-auth:
        condition: service_healthy   
    
  ecomerce-produto:
    build: ./produtos/demo/demo
    image: ecomerce-produto
    environment:
      DB_HOST: ecomerce-mysql-produto
      PROFILE: docker
    ports:
      - "8081:8081"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-mysql-produto:
        condition: service_healthy 

  ecomerce-proxy:
    build: .
    image: ecomerce-proxy
    ports:
      - "80:80"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-auth:
        condition: service_started
  
 