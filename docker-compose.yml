version: "3.9"

networks:
  ecomerce-network:
    driver: bridge

services:

  ecomerce-redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - ecomerce-network


  # apenas com PLAINTEXT sem segurança nenhuma

  # =======================
  # imagem do kafka funciona
