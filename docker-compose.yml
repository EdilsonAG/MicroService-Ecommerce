version: "3.9"

networks:
  ecomerce-network:
    driver: bridge

services:

  ecomerce-redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - ecomerce-network


  ecomerce-kafka:
    image: apache/kafka:3.7.0
    container_name: ecomerce-kafka
    hostname: ecomerce-kafka

    ports:
      - "9092:9092"
      - "9093:9093"

    volumes:
      - kafka-data:/var/lib/kafka/data
     # - ./chavekeystoredev/kafka.jks:/etc/kafka/certs/kafka.jks

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@ecomerce-kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # KAFKA_LISTENERS: SSL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      # KAFKA_ADVERTISED_LISTENERS: SSL://ecomerce-kafka:9093,EXTERNAL://localhost:9092
      # KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,EXTERNAL:SSL,CONTROLLER:PLAINTEXT
      # KAFKA_INTER_BROKER_LISTENER_NAME: SSL

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ecomerce-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/certs/kafka.jks
      # KAFKA_SSL_KEYSTORE_PASSWORD: "123456"
      # KAFKA_SSL_KEY_PASSWORD: "123456"
      # KAFKA_SSL_CLIENT_AUTH: "none"

    networks:
      - ecomerce-network
 

  ecomerce-mysql-produto:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Ed.183729"
    ports:
      - "3308:3306"
    networks:
      - ecomerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pEd.183729"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  ecomerce-mysql-auth:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Ed.183729"
    ports:
      - "3307:3306"
    networks:
      - ecomerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pEd.183729"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ecomerce-auth:
    build: ./auth/demo/demo
    image: ecomerce-auth
    environment:
      DB_HOST: ecomerce-mysql-auth
      PROFILE: docker
      REDIS_HOST: ecomerce-redis
    ports:
      - "8080:8080"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-mysql-auth:
        condition: service_healthy   
    
  ecomerce-produto:
    build: ./produtos/demo/demo
    image: ecomerce-produto
    environment:
      DB_HOST: ecomerce-mysql-produto
      PROFILE: docker
    ports:
      - "8081:8081"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-mysql-produto:
        condition: service_healthy 

  ecomerce-proxy:
    build: .
    image: ecomerce-proxy
    ports:
      - "80:80"
    networks:
      - ecomerce-network
    depends_on:
      ecomerce-auth:
        condition: service_started
  
volumes:
  kafka-data: