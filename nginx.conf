server {
  listen 80;

  # endpoints públicos do Authorization Server
  location /oauth2/ {
    proxy_pass http://ecomerce-auth:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/register {
    proxy_pass http://ecomerce-auth:8080/auth/register;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

  }


  location /auth/login {
    proxy_pass http://ecomerce-auth:8080/auth/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }


  location /auth/callback {
    proxy_pass http://ecomerce-auth:8080/auth/callback;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }


  # validação interna — só o Nginx chama
  location = /auth/validate {
    internal;
    proxy_pass http://ecomerce-auth:8080/auth/validate;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
  }

  # rotas privadas
  location /carrinho {
    auth_request /auth/validate;
    auth_request_set $auth_token $upstream_http_x_access_token;
    #proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization "Bearer $auth_token";
    proxy_pass http://ecomerce-carrinho:4004/odata/v4/carrinho/Carrinho;
  }

  # location /ordem {
  #   auth_request /auth/validate;
  #   proxy_pass http://order-service:8082;
  # }

  # location /pagamento {
  #   auth_request /auth/validate;
  #   proxy_pass http://payment-service:8083;
  # }
  #rota pública
  location /produto {
    auth_request /auth/validate;
    auth_request_set $auth_token $upstream_http_x_access_token;
    proxy_set_header Authorization "Bearer $auth_token";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Debug-Token $auth_token always;
    proxy_pass http://ecomerce-produto:8081/produto;
  }
}