spring.application.name=demo

server.port=8080

 

# security.jwt.private-key-path=C:/keys/private.pem
# security.jwt.public-key-path=C:/keys/public.pem

spring.datasource.url=jdbc:mysql://${DB_HOST}/authmicro?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=ECCOMERCESESSION

